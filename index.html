<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body {
            background-color: #110f0f;
            padding: 20px;
        }

        .grid-container {
            display: grid;
            align-items: center;
            justify-content: center;
        }

        .calculator-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(6, 1fr);
            grid-gap: 1px;
            background-color: #999;
        }

        .calculator-grid button {
            font-size: 25px;
            background-color: #fff;
            border: none;
            cursor: pointer;
            font-family: 'DM Mono', monospace;
        }

        textarea {
            grid-column: span 4;
            font-family: 'DM Mono', monospace;
            font-size: 25px;
            text-align: end;
            background-color: #fad3cb;
            padding: 15px;
            border: none;
        }

        .calculator-grid button:nth-child(n+18) {
            background-color: tomato;
        }


        button:hover,
        .calculator-grid button:nth-child(n+18):hover {
            background-color: #440b15;
            color: white;
            transition: 0.2s;
        }
    </style>
</head>

<body>
    <div class="grid-container">
        <div class="calculator-grid ">
            <textarea type="text" id="inputtext" placeholder="0"></textarea>
            <button>C</button>
            <button>DEL</button>
            <button></button>
            <button>+</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>-</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>*</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>/</button>
            <button>00</button>
            <button>0</button>
            <button>.</button>
            <button>=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
